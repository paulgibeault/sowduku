<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sowdoku</title>
<!-- Paul's Arcade SDK: same-origin storage, settings, lifecycle. Root-relative
     so it resolves both in production and the local dev harness. -->
<script src="/arcade-sdk.js"></script>
<script>if (window.Arcade) Arcade.init({ gameId: "sowduku" });</script>
<style>
  :root { font-size: calc(100% * var(--font-scale, 1)); }
  :root {
    --bg: #f4eee1; --panel: #fbf7ee; --ink: #514b42; --ink-soft: #8a8175;
    --line: #e7dcc8; --thud: rgba(70,62,52,.14);
    --heart: #c98b86; --heart-off: #e3d8c8; --bad: #cf8a7e;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    background: radial-gradient(120% 80% at 50% -10%, #fbf6ea 0%, var(--bg) 60%);
    color: var(--ink); font-family: "Inter","Helvetica Neue",system-ui,sans-serif;
    -webkit-font-smoothing: antialiased; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 3rem 1.25rem;
  }
  .frame { width: min(40rem, 100%); }
  header { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
  .title { font-family: Georgia,"Iowan Old Style",serif; font-weight: 600; font-size: 2.5rem; margin: 0; line-height: 1; }
  .tagline { font-size: .95rem; color: var(--ink-soft); margin: .55rem 0 0; max-width: 26rem; line-height: 1.5; }
  .hearts { display: flex; gap: .35rem; padding-bottom: .3rem; }
  .hearts svg { width: 1.35rem; height: 1.35rem; transition: transform .25s ease; }
  .hearts svg.lost { transform: scale(.85); }

  .chip-row { display: flex; gap: .6rem; margin: 1.5rem 0 1rem; align-items: center; flex-wrap: wrap; }
  .chip { font-size: .8rem; letter-spacing: .04em; color: var(--ink-soft); background: var(--panel);
    border: 1px solid var(--line); border-radius: 999px; padding: .32rem .8rem; }
  .chip strong { color: var(--ink); font-weight: 600; }
  button.chip { cursor: pointer; }
  button.chip:hover { color: var(--ink); border-color: #d8ccb5; }
  button.chip.on { background: #efe6d3; color: var(--ink); }

  .board-wrap { position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 1.4rem; padding: 1.5rem; box-shadow: 0 1px 0 #fff inset, 0 18px 40px -28px rgba(70,62,52,.35); }
  .board { display: grid; border-radius: .7rem; overflow: hidden; width: 100%;
    touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
  .cell { position: relative; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: filter .15s ease; }
  .cell:hover { filter: brightness(.97); }
  .cell svg.pig { width: 74%; height: 74%; }
  .cell.placed svg.pig { filter: drop-shadow(0 3px 0 var(--thud)); animation: thud .25s ease; }
  .cell.bad { animation: nope .4s ease; }
  @keyframes thud { 0%{transform:translateY(-14%) scale(.9);} 60%{transform:translateY(2%) scale(1.02);} 100%{transform:translateY(0) scale(1);} }
  @keyframes nope { 0%,100%{box-shadow:none;} 30%{box-shadow:inset 0 0 0 99px rgba(207,138,126,.35);} }
  .marker { display: flex; gap: 2px; opacity: .5; }
  .marker i { width: .32rem; height: .42rem; border-radius: 50% 50% 45% 45%; background: var(--ink-soft); }
  .marker i:nth-child(1){ transform: translateY(2px) rotate(-12deg);} .marker i:nth-child(3){ transform: translateY(2px) rotate(12deg);}

  /* auto-shaded "impossible" cells recede toward parchment so the open cells —
     where a piggy can still go — clearly pop. The faint hatch keeps the "ruled
     out" read; a manual hoof-print fence stays fully visible and distinct. */
  .cell.shade { filter: saturate(.5) brightness(1.02); }
  .cell.shade::after { content: ""; position: absolute; inset: 0; pointer-events: none;
    background:
      repeating-linear-gradient(45deg, transparent 0 6px, rgba(110,100,84,.12) 6px 9px),
      rgba(245,239,227,.55); }

  .controls { display: flex; gap: .6rem; margin-top: 1rem; align-items: center; flex-wrap: wrap; }
  .controls .spacer { flex: 1; }
  .hint { font-size: .78rem; color: var(--ink-soft); margin: .85rem 0 0; text-align: center; line-height: 1.5; }
  .hint b { color: var(--ink); font-weight: 600; }

  /* solved + out-of-hearts overlays */
  .veil { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: rgba(251,247,238,.82); border-radius: 1.4rem; text-align: center; padding: 2rem; }
  .veil.show { display: flex; }
  .veil .card { max-width: 22rem; }
  .veil h2 { font-family: Georgia,serif; font-weight: 600; font-size: 1.6rem; margin: 0 0 .5rem; }
  .veil p { color: var(--ink-soft); margin: 0 0 1.2rem; line-height: 1.5; }
  .veil button { font: inherit; cursor: pointer; border: 1px solid #d8ccb5; background: #efe6d3;
    color: var(--ink); border-radius: 999px; padding: .5rem 1.2rem; }
  footer { margin-top: 1.4rem; font-family: Georgia,serif; font-style: italic; color: var(--ink-soft);
    font-size: .92rem; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <div class="frame">
    <header>
      <div>
        <h1 class="title">Sowdoku 🐖</h1>
        <p class="tagline">One piggy per row, column &amp; color — and never two touching.</p>
      </div>
      <div class="hearts" id="hearts"></div>
    </header>

    <div class="chip-row">
      <span class="chip" id="modeChip">today’s field</span>
      <span class="chip"><strong id="sizeChip">8×8</strong></span>
      <span class="chip"><strong id="bandChip">meadow</strong></span>
      <span class="chip"><strong id="leftChip">8</strong> left</span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board"></div>
      <div class="veil" id="veil"><div class="card">
        <h2 id="veilTitle"></h2>
        <p id="veilText"></p>
        <button id="veilBtn"></button>
      </div></div>
    </div>

    <div class="controls">
      <button class="chip" id="newBtn">new field</button>
      <button class="chip" id="sizeBtn">size: 8</button>
      <button class="chip" id="slowBtn">slow mode</button>
      <button class="chip" id="assistBtn">assist: gated</button>
      <span class="spacer"></span>
      <button class="chip" id="clearBtn">clear</button>
    </div>

    <p class="hint"><b>Tap</b> to settle a piggy · <b>long-press</b> or <b>right-click</b> to fence off a patch · <b>drag</b> to fence a run</p>

    <footer>“…a cup of coffee going cold because you’re one piggy away from a perfect field.”</footer>
  </div>

<script src="sowdoku.js"></script>
<script>
(function () {
  "use strict";

  // ---- Arcade platform bridge ----
  // Arcade.init() ran in <head>. The SDK gives same-origin storage, settings,
  // and lifecycle when framed or served over http; it degrades gracefully to
  // plain localStorage when absent (e.g. opened straight from file://).
  var A = window.Arcade;
  var SKEY = "arcade.v1.sowduku.inProgress";
  function saveState(obj) {
    if (A && A.state) A.state.set("inProgress", obj);         // SDK handles JSON
    else localStorage.setItem(SKEY, JSON.stringify(obj));
  }
  function loadState() {
    if (A && A.state) return A.state.get("inProgress") || null;
    var raw = localStorage.getItem(SKEY);
    return raw ? JSON.parse(raw) : null;
  }

  var PALETTE = ["#cdd6bb","#e6cdb8","#e3c2cb","#c3d0d8","#ecdcae","#d3cadf","#cad9c6","#e9d3bd","#dcb9a6"];
  var MAX_HEARTS = 5;

  function pigSVG() {
    return '<svg class="pig" viewBox="0 0 64 64" fill="none" stroke="#6c6358" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M14 30c0-9 8-15 18-15s18 6 18 15c0 10-8 17-18 17S14 40 14 30Z" fill="#fff8f4"/>' +
      '<path d="M16 20c-3-4-2-8 1-8 2 0 5 3 6 7" fill="#fdeede"/>' +
      '<path d="M48 20c3-4 2-8-1-8-2 0-5 3-6 7" fill="#fdeede"/>' +
      '<ellipse cx="32" cy="33" rx="9" ry="7" fill="#fbe1d8"/>' +
      '<path d="M29 33h.2M35 33h.2" stroke-width="3.2"/>' +
      '<path d="M23 26c1.6 1.4 3.6 1.4 5 0"/><path d="M36 26c1.6 1.4 3.6 1.4 5 0"/></svg>';
  }
  function heartSVG(filled) {
    return '<svg viewBox="0 0 24 24" class="' + (filled ? "" : "lost") + '" fill="' + (filled ? "var(--heart)" : "var(--heart-off)") +
      '"><path d="M12 21s-7.5-4.6-10-9.2C.3 8.3 2 4.5 5.6 4.5c2 0 3.4 1.2 4.4 2.7C11 5.7 12.4 4.5 14.4 4.5 18 4.5 19.7 8.3 22 11.8 19.5 16.4 12 21 12 21Z"/></svg>';
  }

  // "one field a day" seed — same layout for everyone on a given date
  function dailySeed() {
    var d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  }

  // assist mode is a player preference (persists across puzzles), separate from
  // the per-field in-progress save: 'auto' | 'manual' | 'gated'.
  var ASSIST_KEY = "arcade.v1.sowduku.assist";
  var ASSIST_MODES = ["auto", "gated", "manual"];
  function loadAssist() {
    var v = (A && A.state) ? A.state.get("assist") : localStorage.getItem(ASSIST_KEY);
    return ASSIST_MODES.indexOf(v) >= 0 ? v : "gated";
  }
  function saveAssist(v) {
    if (A && A.state) A.state.set("assist", v);
    else localStorage.setItem(ASSIST_KEY, v);
  }

  var game = null; // { puzzle, piggies:Set, fences:Set, hearts, slow, assist, mode, solved }

  function freshGame(opts) {
    var puzzle = Sowdoku.generate(opts) || Sowdoku.generate({ size: opts.size, seed: opts.seed });
    return { puzzle: puzzle, piggies: new Set(), fences: new Set(),
             hearts: MAX_HEARTS, slow: false, assist: loadAssist(),
             mode: opts.mode || "daily", solved: false };
  }

  function startDaily(size) {
    game = freshGame({ size: size || 8, difficulty: "meadow", seed: dailySeed(), mode: "daily" });
    persist(); render();
  }
  function startNew(size) {
    var seed = (dailySeed() * 131 + Math.floor(Math.random() * 1e6)) >>> 0;
    game = freshGame({ size: size || game.puzzle.size, difficulty: "meadow", seed: seed, mode: "stroll" });
    persist(); render();
  }

  // ---- persistence ----
  function persist() {
    saveState({
      seed: game.puzzle.seed, size: game.puzzle.size, mode: game.mode,
      regions: game.puzzle.regions, solution: game.puzzle.solution,
      difficulty: game.puzzle.difficulty,
      piggies: Array.from(game.piggies), fences: Array.from(game.fences),
      hearts: game.hearts, slow: game.slow, solved: !!game.solved
    });
  }
  function restore() {
    try {
      var s = loadState();
      if (!s || !s.regions || !s.solution) return false;
      game = {
        puzzle: { size: s.size, regions: s.regions, solution: s.solution, difficulty: s.difficulty, seed: s.seed },
        piggies: new Set(s.piggies || []),
        fences: new Set(s.fences || s.markers || []),   // migrate the old "markers" field
        hearts: s.hearts != null ? s.hearts : MAX_HEARTS,
        slow: !!s.slow, solved: !!s.solved, assist: loadAssist(), mode: s.mode || "daily"
      };
      return true;
    } catch (e) { return false; }
  }

  // re-read after a launcher import
  if (A && A.onStateReplaced) A.onStateReplaced(function () { if (!restore()) startDaily(8); render(); });

  // ---- helpers ----
  var key = function (r, c) { return r + "," + c; };
  function haptic(pattern) { if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} } }

  // is the auto-shading of impossible cells active right now?
  function assistOn() {
    if (game.assist === "manual") return false;
    if (game.assist === "auto") return true;
    return game.puzzle.difficulty !== "hilltop"; // gated: on for sunbeam/meadow, off for hilltop
  }

  // ---- mutations ----
  function placePiggy(r, c) {
    var k = key(r, c);
    if (Sowdoku.isLegalPlacement(game.puzzle.size, game.puzzle.regions, game.piggies, r, c)) {
      game.piggies.add(k); game.fences.delete(k); haptic(8);
      if (Sowdoku.isSolved(game.puzzle.size, game.puzzle.regions, game.piggies)) game.solved = true;
    } else if (assistOn()) {
      haptic(4);                  // board already hatches this as impossible — gentle no-op, no heart
    } else {
      if (!game.slow) game.hearts = Math.max(0, game.hearts - 1);
      haptic([10, 40, 10]); flashBad(r, c);
    }
  }
  function setFence(r, c, on) {
    var k = key(r, c);
    if (game.piggies.has(k)) return;          // never fence a settled piggy
    if (on) game.fences.add(k); else game.fences.delete(k);
  }

  var badCell = null;
  function flashBad(r, c) {
    badCell = key(r, c);
    setTimeout(function () { badCell = null; render(); }, 420);
  }

  // ---- pointer interaction ----
  // tap = settle/lift a piggy · long-press (or right-click) = fence a patch ·
  // drag = paint fences across a run. One unified pointer session handles all three.
  var board = document.getElementById("board");
  var LONG_MS = 420, MOVE_PX = 8;
  var ps = null; // active pointer session

  function cellAt(x, y) {
    var el = document.elementFromPoint(x, y);
    var cell = el && el.closest ? el.closest(".cell") : null;
    return cell ? { r: +cell.dataset.r, c: +cell.dataset.c } : null;
  }
  function locked() { return game.solved || (!game.slow && game.hearts === 0); }

  board.addEventListener("pointerdown", function (e) {
    if (locked()) return;
    if (e.pointerType === "mouse" && e.button !== 0) return; // right-click handled by contextmenu
    var cell = e.target.closest && e.target.closest(".cell"); if (!cell) return;
    try { board.setPointerCapture(e.pointerId); } catch (x) {}
    ps = { id: e.pointerId, r: +cell.dataset.r, c: +cell.dataset.c, x: e.clientX, y: e.clientY,
           dragged: false, longFired: false, mode: null, painted: new Set(), timer: null };
    ps.timer = setTimeout(function () {
      if (ps && !ps.dragged) {                  // held in place -> fence this cell
        ps.longFired = true;
        setFence(ps.r, ps.c, !game.fences.has(key(ps.r, ps.c)));
        haptic(6); persist(); render();
      }
    }, LONG_MS);
  });

  board.addEventListener("pointermove", function (e) {
    if (!ps || e.pointerId !== ps.id || ps.longFired) return;
    if (!ps.dragged) {
      var here = cellAt(e.clientX, e.clientY);
      var moved = Math.abs(e.clientX - ps.x) > MOVE_PX || Math.abs(e.clientY - ps.y) > MOVE_PX;
      var leftStart = here && (here.r !== ps.r || here.c !== ps.c);
      if (!moved && !leftStart) return;
      ps.dragged = true; clearTimeout(ps.timer);
      ps.mode = game.fences.has(key(ps.r, ps.c)) ? "off" : "on"; // paint direction set by start cell
      paintAt(ps.r, ps.c);
    }
    var cur = cellAt(e.clientX, e.clientY);
    if (cur) paintAt(cur.r, cur.c);
  });

  function paintAt(r, c) {
    var k = key(r, c);
    if (ps.painted.has(k)) return; ps.painted.add(k);
    if (game.piggies.has(k)) return;            // drag never disturbs a piggy
    setFence(r, c, ps.mode === "on");
    haptic(3); render();
  }

  function endPointer(e) {
    if (!ps || (e && e.pointerId !== ps.id)) return;
    clearTimeout(ps.timer);
    try { board.releasePointerCapture(ps.id); } catch (x) {}
    if (!ps.dragged && !ps.longFired) {         // a clean tap -> toggle piggy
      if (game.piggies.has(key(ps.r, ps.c))) game.piggies.delete(key(ps.r, ps.c));
      else placePiggy(ps.r, ps.c);
    }
    ps = null; persist(); render();
  }
  board.addEventListener("pointerup", endPointer);
  board.addEventListener("pointercancel", endPointer);

  board.addEventListener("contextmenu", function (e) {
    e.preventDefault();                          // right-click = fence (no browser menu)
    if (locked()) return;
    var cell = e.target.closest && e.target.closest(".cell"); if (!cell) return;
    var r = +cell.dataset.r, c = +cell.dataset.c;
    setFence(r, c, !game.fences.has(key(r, c))); haptic(6); persist(); render();
  });

  // ---- render ----
  function render() {
    var p = game.puzzle, n = p.size, reg = p.regions;
    document.getElementById("sizeChip").textContent = n + "×" + n;
    document.getElementById("bandChip").textContent = p.difficulty || "—";
    document.getElementById("leftChip").textContent = n - game.piggies.size;
    document.getElementById("modeChip").textContent = game.mode === "daily" ? "today’s field" : "the amble";
    document.getElementById("sizeBtn").textContent = "size: " + n;
    document.getElementById("slowBtn").classList.toggle("on", game.slow);
    document.getElementById("assistBtn").textContent = "assist: " + game.assist;
    document.getElementById("assistBtn").classList.toggle("on", game.assist !== "manual");

    // hearts (hidden in slow mode)
    var he = document.getElementById("hearts");
    he.style.visibility = game.slow ? "hidden" : "visible";
    var h = "";
    for (var i = 0; i < MAX_HEARTS; i++) h += heartSVG(i < game.hearts);
    he.innerHTML = h;

    var shade = assistOn() && game.piggies.size > 0;

    board.style.gridTemplateColumns = "repeat(" + n + ", 1fr)";
    var same = function (r1, c1, r2, c2) { return r2 >= 0 && r2 < n && c2 >= 0 && c2 < n && reg[r1][c1] === reg[r2][c2]; };
    var thick = "1.8px solid rgba(81,75,66,.55)", thin = "1px solid rgba(255,255,255,.35)";
    board.innerHTML = "";
    for (var r = 0; r < n; r++) {
      for (var c = 0; c < n; c++) {
        var cell = document.createElement("div");
        cell.className = "cell"; cell.dataset.r = r; cell.dataset.c = c;
        cell.style.background = PALETTE[reg[r][c] % PALETTE.length];
        cell.style.borderTop = same(r, c, r - 1, c) ? thin : thick;
        cell.style.borderLeft = same(r, c, r, c - 1) ? thin : thick;
        cell.style.borderRight = same(r, c, r, c + 1) ? thin : thick;
        cell.style.borderBottom = same(r, c, r + 1, c) ? thin : thick;
        var k = key(r, c);
        if (game.piggies.has(k)) { cell.classList.add("placed"); cell.innerHTML = pigSVG(); }
        else if (game.fences.has(k)) { cell.innerHTML = '<div class="marker"><i></i><i></i><i></i></div>'; }
        else if (shade && !Sowdoku.isLegalPlacement(n, reg, game.piggies, r, c)) { cell.classList.add("shade"); }
        if (k === badCell) cell.classList.add("bad");
        board.appendChild(cell);
      }
    }
    renderVeil();
  }

  function renderVeil() {
    var v = document.getElementById("veil");
    if (game.solved) {
      document.getElementById("veilTitle").textContent = "A perfect field.";
      document.getElementById("veilText").textContent = "Every piggy has its patch. Nothing to do now but enjoy the quiet snuffle.";
      var b = document.getElementById("veilBtn"); b.textContent = "tend another"; b.onclick = function () { startNew(); };
      v.classList.add("show");
    } else if (!game.slow && game.hearts === 0) {
      document.getElementById("veilTitle").textContent = "The field got a little crowded.";
      document.getElementById("veilText").textContent = "No harm done. Shall we settle the piggies again from the start?";
      var b2 = document.getElementById("veilBtn"); b2.textContent = "fresh start";
      b2.onclick = function () { game.piggies.clear(); game.fences.clear(); game.hearts = MAX_HEARTS; game.solved = false; persist(); render(); };
      v.classList.add("show");
    } else {
      v.classList.remove("show");
    }
  }

  // ---- controls ----
  var SIZES = [6, 7, 8, 9];
  document.getElementById("newBtn").onclick = function () { startNew(); };
  document.getElementById("sizeBtn").onclick = function () {
    var i = SIZES.indexOf(game.puzzle.size); var next = SIZES[(i + 1) % SIZES.length];
    (game.mode === "daily" ? startDaily : startNew)(next);
  };
  document.getElementById("slowBtn").onclick = function () {
    game.slow = !game.slow; if (game.slow) game.hearts = MAX_HEARTS; persist(); render();
  };
  document.getElementById("assistBtn").onclick = function () {
    var i = ASSIST_MODES.indexOf(game.assist);
    game.assist = ASSIST_MODES[(i + 1) % ASSIST_MODES.length];
    saveAssist(game.assist); persist(); render();
  };
  document.getElementById("clearBtn").onclick = function () {
    game.piggies.clear(); game.fences.clear(); game.solved = false;
    if (!game.slow) game.hearts = MAX_HEARTS; persist(); render();
  };

  // ---- boot: resume in-progress field, else today's ----
  if (!restore()) startDaily(8);
  render();
})();
</script>
</body>
</html>
